#
# GitHub Clock Manager end-to-end simulation script
# - Build and install linuxptp, chronyd, libchrony, libptpmgmt, and
#   Clock Manager in debian system and test with clknetsim to verify proper
#   functionality.
###############################################################################

name: Clock Manager E2E Simulation

# On every push and Pull Request (PR)
on: [push, pull_request, workflow_dispatch]

# Permit read-only with GITHUB_TOKEN
permissions: read-all

jobs:
  clkmgr_e2e:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/erezgeva/deb.trixie:latest
    env:
      GITHUB_CONTAINER: deb.trixie

    steps:

    - name: checkout linuxptp repository
      uses: actions/checkout@v4
      with:
        repository: nwtime/linuxptp
        path: linuxptp

    - name: checkout clknetsim repository
      uses: actions/checkout@v4
      with:
        repository: mlichvar/clknetsim
        path: clknetsim

    - name: checkout libptpmgmt repository
      uses: actions/checkout@v4
      with:
        path: libptpmgmt

    - name: build and install linuxptp
      run: |
        ptp4l -v
        cd linuxptp
        make
        sudo make install
        cd ..
        ptp4l -v

    - name: build libptpmgmt, clock manager, and sample app
      run: |
        cd libptpmgmt
        autoreconf -i
        ./configure
        make
        cd clkmgr/sample
        make
        cd ../../..

    - name: test with clknetsim
      run: sudo ./libptpmgmt/clkmgr/tool/sim.sh
